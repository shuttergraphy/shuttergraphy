<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShutterGraphy</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: white;
    }
    .hero {
      height: 100vh;
      width: 100vw;
      background-color: #222;
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: background-image 0.8s ease-in-out;
    }
    .heading-box {
      padding: 15px 30px;
      margin-top: 20px;
      border-radius: 6px;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="hero" id="hero">
    <div class="heading-box">
      <h1>Welcome to ShutterGraphy</h1>
    </div>
    <div id="nav-placeholder"></div>
  </div>

  <script>
    const images = [
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
      "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
      "https://images.unsplash.com/photo-1549921296-3a9981daaa4e"
    ];
    const randomImage = images[Math.floor(Math.random() * images.length)];
    document.getElementById("hero").style.backgroundImage = `url('${randomImage}')`;

    // Load navigation from external nav.html file
    fetch("nav.html")
      .then(response => response.text())
      .then(data => document.getElementById("nav-placeholder").innerHTML = data);
  </script>
</body>
</html>
