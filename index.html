<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShutterGraphy</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: white;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      padding-top: 40px;
      font-size: 2.5rem;
    }
    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      width: 100vw;
      margin: 0;
    }
    .gallery img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Welcome to ShutterGraphy</h1>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature Abstract">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Moody Landscape">
    <img src="https://images.unsplash.com/photo-1549921296-3a9981daaa4e" alt="Night Street">
    <img src="https://images.unsplash.com/photo-1516251193007-45ef944ab0c6" alt="Golden Silhouette">
  </div>
</body>
</html>
