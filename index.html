<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShutterGraphy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=TAN+Mon+Cheri&display=swap');

    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .hero {
      height: 100vh;
      width: 100vw;
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      transition: background-image 0.8s ease-in-out;
      padding: 40px 20px;
    }
    .heading-box {
      margin-top: 0;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0;
      text-align: center;
    }
    .description {
      font-family: 'TAN Mon Cheri', serif;
      font-size: 1rem;
      text-align: center;
      max-width: 600px;
      margin: 20px 0;
      line-height: 1.5;
    }
    .get-started-btn {
      background: none;
      color: white;
      padding: 12px 28px;
      border: 1px solid white;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-decoration: none;
      margin-bottom: 15px;
    }
    .get-started-btn:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="hero" id="hero">
    <div class="heading-box">
      <h1>Welcome to ShutterGraphy</h1>
    </div>
    <p class="description">
      ShutterGraphy is a global platform for photographers to showcase and sell their work.
      Discover breathtaking images or share your own with the world. Built for artists, by artists.
    </p>
    <a href="#" class="get-started-btn">Get Started</a>
  </div>

  <script>
    const images = [
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
      "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
      "https://images.unsplash.com/photo-1549921296-3a9981daaa4e"
    ];
    const randomImage = images[Math.floor(Math.random() * images.length)];
    document.getElementById("hero").style.backgroundImage = `url('${randomImage}')`;
  </script>
</body>
</html>
